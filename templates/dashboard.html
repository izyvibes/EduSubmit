<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard 🏠</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 100%;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        a {
            display: block;
            text-decoration: none;
            background: #ff7e5f;
            color: #fff;
            padding: 12px 0;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: #feb47b;
        }

        p.role {
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
            }

            h2 {
                font-size: 24px;
            }

            a {
                padding: 10px 0;
                font-size: 14px;
            }

            p.role {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome {{ username }} 👋</h2>
        <p class="role">Role: {{ role }}</p>

        {% if role == 'student' %}
            <a href="/assignment">Submit Assignment 📚</a>
        {% elif role == 'teacher' %}
            <a href="/submissions">View Submissions 📝</a>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        {% endif %}

        <a href="/logout">Logout 🚪</a>
    </div>
    
</body>
</html>
