<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(to right, #ff7e5f, #feb47b);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    background: rgba(0,0,0,0.3);
    padding: 30px 40px;
    border-radius: 12px;
    text-align: center;
    width: 100%;
    max-width: 400px;
}

h2 {
    margin-bottom: 20px;
    font-size: 24px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 6px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #fff;
    color: #ff7e5f;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background-color: #ffe3d1;
}

.flash {
    color: #ffef96;
    margin-bottom: 10px;
    font-size: 14px;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 500px){
    .container {
        padding: 20px;
    }
    h2 {
        font-size: 20px;
    }
    input, button {
        padding: 10px;
        font-size: 14px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h2>Verify OTP for {{ email }}</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <br>
        <button type="submit">Verify</button>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    </form>
    <form method="POST" action="/resend_otp">
    <input type="hidden" name="email" value="{{ email }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit">Resend OTP</button>
</form>
</div>

</body>
</html>
