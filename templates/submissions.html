<!DOCTYPE html>
<html>
<head>
    <title>All Submissions 📚</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #FF7E5F, #FEB47B);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px #000;
        }
        .buttons {
            margin-bottom: 20px;
            text-align: center;
        }
        .buttons a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }
        .buttons a:hover {
            background-color: rgba(0,0,0,0.5);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: rgba(0,0,0,0.2);
        }
        tr:nth-child(even) {
            background-color: rgba(0,0,0,0.1);
        }
        a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
        }
        a:hover {
            color: #000;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
                width: 100%;
            }
            tr {
                margin-bottom: 15px;
                border-bottom: 1px solid rgba(255,255,255,0.2);
            }
            th {
                display: none;
            }
            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: calc(50% - 30px);
                padding-right: 10px;
                font-weight: bold;
                text-align: left;
                color: #fff;
            }
        }
    </style>
</head>
<body>

    <h1>All Submissions 📚</h1>

    <div class="buttons">
        <a href="/dashboard">⬅ Back to Dashboard</a>
        <a href="/download_all">Download All 📦</a>
    </div>

    <table>
        <tr>
            <th>Name</th>
            <th>Matric</th>
            <th>Course</th>
            <th>File</th>
            <th>Action</th>
        </tr>
        {% for submission in submissions %}
        <tr>
            <td data-label="Name">{{ submission.fullname }}</td>
            <td data-label="Matric">{{ submission.matric }}</td>
            <td data-label="Course">{{ submission.course }}</td>
            <td data-label="File">
                {% if submission.filename %}
                    <a href="{{ url_for('uploads', filename=submission.filename) }}">{{ submission.filename }}</a>
                {% else %}
                    No file
                {% endif %}
            </td>
            <td data-label="Action">
    <form action="{{ url_for('delete_submission', id=submission.id) }}" method="POST" style="display:inline;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" style="
            background:none;
            border:none;
            color:#fff;
            font-weight:bold;
            cursor:pointer;
        ">
            Delete ❌
        </button>
    </form>
</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
